{% extends 'base.html' %}
{% block title %}Blog Form{% endblock %}

{% block content %}

<div class="card" style="max-width:500px;margin:auto;">
    <h2>Create / Update Blog</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
</div>

{% endblock %}
