<!DOCTYPE html>
<html>

<head>
    <title>Blog Form</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 450px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin: 6px 0 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.4);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.03);
        }

        .image-preview {
            margin: 10px 0;
            text-align: center;
        }

        .image-preview img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: white;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">

            <h2>
                {% if form.instance.pk %}
                ✏️ Update Blog
                {% else %}
                ➕ Create Blog
                {% endif %}
            </h2>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- Title -->
                <label>Title</label>
                {{ form.title }}

                <!-- Content -->
                <label>Content</label>
                {{ form.content }}

                <!-- Cover Image -->
                <label>Cover Image</label>
                {{ form.cover_image }}

                <!-- Preview Image -->
                {% if form.instance.cover_image %}
                <div class="image-preview">
                    <p><b>Current Image:</b></p>
                    <img src="{{ form.instance.cover_image.url }}">
                </div>
                {% endif %}

                <!-- Category -->
                <label>Category</label>
                {{ form.category }}

                <!-- Tags -->
                <label>Tags</label>
                {{ form.tags }}

                <button type="submit">
                    {% if form.instance.pk %}
                    Update Blog
                    {% else %}
                    Create Blog
                    {% endif %}
                </button>
            </form>

        </div>

        <a href="{% url 'blog_list' %}" class="back-link">⬅ Back to Blogs</a>
    </div>

</body>

</html>
