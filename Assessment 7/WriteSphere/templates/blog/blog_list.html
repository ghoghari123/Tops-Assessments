<!DOCTYPE html>
<html>
<head>
    <title>All Blogs</title>
</head>
<body>

<h1>All Blogs</h1>

<a href="{% url 'create_blog' %}">➕ Create New Blog</a>

<hr>

{% for blog in blogs %}
    <div style="margin-bottom: 20px;">

        <h3>{{ blog.title }}</h3>

        {% if blog.cover_image %}
            <img src="{{ blog.cover_image.url }}" width="200">
        {% endif %}

        <p>{{ blog.content|truncatewords:20 }}</p>

        <p><b>Category:</b> {{ blog.category }}</p>

        <a href="{% url 'blog_detail' blog.id %}">Read More</a>

    </div>
    <hr>
{% empty %}
    <p>No blogs found.</p>
{% endfor %}

</body>
</html>
