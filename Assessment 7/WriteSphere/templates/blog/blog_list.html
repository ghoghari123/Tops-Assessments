<!DOCTYPE html>
<html>

<head>
    <title>All Blogs</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .create-btn {
            display: block;
            width: fit-content;
            margin: 0 auto 20px;
            padding: 10px 18px;
            background: white;
            color: #667eea;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .create-btn:hover {
            background: #eee;
            transform: scale(1.05);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
            animation: fadeIn 0.6s ease-in-out;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
            height: 160px;
            object-fit: cover;
        }

        .card h3 {
            margin-bottom: 8px;
        }

        .card p {
            font-size: 14px;
            color: #555;
        }

        .category {
            font-size: 12px;
            margin-top: 8px;
            color: #777;
        }

        .read-more {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
            transition: 0.3s;
        }

        .read-more:hover {
            text-decoration: underline;
        }

        .no-blogs {
            text-align: center;
            color: white;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>All Blogs</h1>

        <a href="{% url 'create_blog' %}" class="create-btn">
            ➕ Create New Blog
        </a>

        <div class="grid">
            {% for blog in blogs %}
            <div class="card">

                {% if blog.cover_image %}
                <img src="{{ blog.cover_image.url }}">
                {% endif %}

                <h3>{{ blog.title }}</h3>

                <p>{{ blog.content|truncatewords:20 }}</p>

                <p class="category"><b>Category:</b> {{ blog.category }}</p>

                <a href="{% url 'blog_detail' blog.id %}" class="read-more">
                    Read More →
                </a>

            </div>
            {% empty %}
            <p class="no-blogs">No blogs found.</p>
            {% endfor %}
        </div>

    </div>

</body>

</html>
