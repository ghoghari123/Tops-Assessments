{% extends 'base.html' %}
{% block title %}Profile{% endblock %}

{% block content %}

<div class="card">
    <h2>{{ user_profile.username }}</h2>

    <p>Followers: {{ followers }}</p>
    <p>Following: {{ following }}</p>

    {% if request.user != user_profile %}
    <form method="post">
        {% csrf_token %}
        <button>
            {% if is_following %}Unfollow{% else %}Follow{% endif %}
        </button>
    </form>
    {% endif %}

</div>

{% endblock %}
