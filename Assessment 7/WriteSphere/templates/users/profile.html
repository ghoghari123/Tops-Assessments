<h2>{{ user_profile.username }}'s Profile</h2>

<p>Followers: {{ followers }}</p>
<p>Following: {{ following }}</p>

{% if request.user != user_profile %}
<form method="post" action="{% url 'toggle_follow' user_profile.id %}">
    {% csrf_token %}
    <button type="submit">
        {% if is_following %}
            Unfollow
        {% else %}
            Follow
        {% endif %}
    </button>
</form>
{% endif %}

<hr>

<h3>Posts</h3>

{% for post in posts %}
    <h4>{{ post.title }}</h4>
{% endfor %}
