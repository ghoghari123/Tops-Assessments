<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Blog{% endblock %}</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #333;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            margin: 15px;
            border-radius: 12px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-left a,
        .nav-right a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            position: relative;
        }

        .nav-left a::after,
        .nav-right a::after {
            content: "";
            position: absolute;
            height: 2px;
            width: 0;
            bottom: -3px;
            left: 0;
            background: white;
            transition: 0.3s;
        }

        .nav-left a:hover::after,
        .nav-right a:hover::after {
            width: 100%;
        }

        .btn {
            background: white;
            color: #667eea !important;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">

        <div class="nav-left">
            <a href="{% url 'blog_list' %}">Home</a>
        </div>

        <div class="nav-right">
            {% if user.is_authenticated %}
            <span>👋 {{ user.username }}</span>

            <a href="{% url 'profile' user.id %}">Profile</a>

            {% if user.profile.role == 'author' %}
            <a href="{% url 'create_blog' %}">Create Blog</a>
            {% endif %}

            <a href="{% url 'logout' %}" class="btn">Logout</a>

            {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}" class="btn">Register</a>
            {% endif %}
        </div>

    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
